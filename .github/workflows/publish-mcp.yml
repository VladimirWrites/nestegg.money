name: Publish to MCP Registry

# Re-publishes server.json to the official MCP registry whenever it changes on main
# (e.g. after a version bump), plus a manual trigger. Auth is keyless via GitHub Actions
# OIDC — the io.github.VladimirWrites/* namespace is proven by the repo owner, no secrets.
on:
  push:
    branches: [main]
    paths: ["server.json"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for the github-oidc login
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          url=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*linux_amd64.tar.gz"' | head -1 | cut -d'"' -f4)
          echo "Downloading $url"
          curl -sL "$url" | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
